<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="債務管理"/>
  <meta name="theme-color" content="#0a0e17"/>
  <title>債務管理中心</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0e17;-webkit-tap-highlight-color:transparent;}
    #root{min-height:100vh;}
    .app{min-height:100vh;background:#0a0e17;color:#dde3f0;font-family:'Noto Sans TC',sans-serif;padding:20px 16px 60px;}
    .h1{font-size:21px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(90deg,#ff6b6b,#ffa94d,#ffd43b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px;}
    .hsub{font-size:11px;color:#3a4a5e;font-family:'JetBrains Mono',monospace;margin-bottom:22px;}
    .tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{padding:8px 14px;border-radius:8px;border:1px solid #1e2a3a;background:transparent;color:#4a5568;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;}
    .tab.active{background:#1e2a3a;color:#dde3f0;border-color:#2d3f55;}
    .card{background:#0f1520;border:1px solid #1a2535;border-radius:16px;padding:16px;margin-bottom:12px;}
    .ctitle{font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;margin-bottom:12px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .mc{background:#0f1520;border:1px solid #1a2535;border-radius:12px;padding:14px;}
    .mlabel{font-size:11px;color:#4a5568;font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
    .mval{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;}
    .red{color:#ff6b6b;}.green{color:#69db7c;}.yellow{color:#ffd43b;}.blue{color:#4dabf7;}
    .drow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #111827;}
    .drow:last-child{border-bottom:none;}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .dname{font-size:13px;font-weight:700;flex:1;}
    .dmeta{font-size:11px;color:#4a5568;font-family:'JetBrains Mono',monospace;}
    .dbal{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;}
    .bwrap{height:5px;background:#1a2535;border-radius:3px;overflow:hidden;margin-top:5px;}
    .bfill{height:100%;border-radius:3px;}
    .badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:5px;}
    .br{background:rgba(255,107,107,.18);color:#ff6b6b;}
    .bg{background:rgba(105,219,124,.18);color:#69db7c;}
    .by{background:rgba(255,212,59,.18);color:#ffd43b;}
    .tip{background:rgba(255,212,59,.06);border:1px solid rgba(255,212,59,.18);border-radius:10px;padding:12px;font-size:12px;line-height:1.7;color:#c8d0e0;margin-top:10px;}
    .tip strong{color:#ffd43b;}
    .alert{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.22);border-radius:10px;padding:12px;font-size:12px;color:#ffb3b3;line-height:1.7;margin-bottom:12px;}
    .frow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111827;font-size:13px;}
    .frow:last-child{border-bottom:none;}
    .flabel{color:#8a9ab0;}
    .fplus{color:#69db7c;font-family:'JetBrains Mono',monospace;font-weight:600;}
    .fminus{color:#ff6b6b;font-family:'JetBrains Mono',monospace;font-weight:600;}
    .hdiv{height:1px;background:linear-gradient(90deg,transparent,#2d3f55,transparent);margin:10px 0;}
    .prow{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid #111827;}
    .prow:last-child{border-bottom:none;}
    .pnum{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;background:#1a2535;color:#dde3f0;}
    .pnum.urgent{background:#ff6b6b;color:#0a0e17;}
    .pbody{flex:1;}
    .pname{font-size:13px;font-weight:700;margin-bottom:3px;}
    .preason{font-size:11px;color:#4a5568;line-height:1.5;}
    .pamount{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;color:#ffd43b;white-space:nowrap;}
    .cleared{opacity:.35;text-decoration:line-through;}
    .plabel{display:flex;justify-content:space-between;font-size:11px;color:#4a5568;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
    .pbar{height:8px;background:#1a2535;border-radius:4px;overflow:hidden;}
    .pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,#69db7c,#4dabf7);}
    .mcard{background:#0f1520;border:1px solid #1a2535;border-radius:14px;padding:15px;margin-bottom:14px;}
    .mcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .mcard-month{font-size:16px;font-weight:900;}
    .mcard-bonus{font-size:12px;color:#69db7c;font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:8px;}
    .arow{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
    .adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .aname{flex:1;color:#8a9ab0;}
    .apay{font-family:'JetBrains Mono',monospace;font-weight:600;color:#ffd43b;}
    .cbadge{display:inline-block;background:rgba(105,219,124,.15);border:1px solid rgba(105,219,124,.3);color:#69db7c;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;margin:2px 3px;font-family:'JetBrains Mono',monospace;}
    .brow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #111827;font-size:13px;}
    .bmon{color:#4dabf7;font-family:'JetBrains Mono',monospace;font-weight:600;width:40px;}
    .blab{flex:1;color:#8a9ab0;}
    .bamt{font-family:'JetBrains Mono',monospace;font-weight:600;color:#69db7c;}
    .erow{padding:14px 0;border-bottom:1px solid #111827;}
    .erow:last-child{border-bottom:none;}
    .ehead{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .ename{font-size:13px;font-weight:700;flex:1;}
    .erate{font-size:11px;color:#4a5568;font-family:'JetBrains Mono',monospace;}
    .ewrap{display:flex;align-items:center;gap:8px;}
    .einput{flex:1;background:#12192a;border:1px solid #1e2a3a;border-radius:9px;color:#dde3f0;font-size:16px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:10px 12px;outline:none;-webkit-appearance:none;}
    .einput:focus{border-color:#4dabf7;}
    .einput.ch{border-color:#69db7c;}
    .eunit{font-size:12px;color:#4a5568;font-family:'JetBrains Mono',monospace;}
    .ediff{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:4px;}
    .sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#69db7c,#4dabf7);border:none;border-radius:12px;color:#0a0e17;font-size:15px;font-weight:900;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:16px;}
    .rbtn{width:100%;padding:10px;background:transparent;border:1px solid #2d3f55;border-radius:10px;color:#4a5568;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:8px;}
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#69db7c;color:#0a0e17;font-weight:900;font-size:13px;padding:12px 24px;border-radius:30px;z-index:999;white-space:nowrap;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const SK = "dv5";

const DD = [
  {id:1, name:"國泰信用卡",    bal:55138,   rate:15.0,  type:"rev",  due:17,   mp:0,     col:"#ff6b6b"},
  {id:3, name:"樂天信貸",      bal:580463,  rate:5.03,  type:"loan", due:22,   mp:6373,  col:"#ffd43b"},
  {id:4, name:"Line Bank 一筆", bal:194747,  rate:8.97,  type:"loan", due:22,   mp:2530,  col:"#69db7c"},
  {id:5, name:"中信信貸",      bal:196113,  rate:14.84, type:"loan", due:29,   mp:3784,  col:"#4dabf7"},
  {id:6, name:"Line Bank 二筆", bal:1643775, rate:3.48,  type:"loan", due:30,   mp:16000, col:"#748ffc"},
  {id:7, name:"玉山信貸",      bal:240000,  rate:13.0,  type:"loan", due:23,   mp:5582,  col:"#da77f2"},
  {id:8, name:"親友",          bal:70000,   rate:0,     type:"fri",  due:null, mp:0,     col:"#f783ac"},
  {id:9, name:"學貸",          bal:10999,   rate:1.5,   type:"loan", due:4,    mp:3700,  col:"#a9e34b"},
  {id:10,name:"電商貨款",      bal:0,       rate:0,     type:"fix",  due:null, mp:50000, col:"#63e6be"},
];

const FS = {5:30000,6:30000,7:40000};
const INC = 226000;
const EXP = 44455;

const BON = [
  {m:2,a:200000,l:"太太年終"},
  {m:6,a:80000, l:"夫妻獎金"},
  {m:7,a:20000, l:"太太獎金"},
  {m:9,a:26000, l:"太太獎金"},
  {m:12,a:260000,l:"我的年終"},
];

const PRI = [
  {id:8,u:true, r:"無利率親友優先，剩7萬，5/3萬、6/3萬、7/4萬還清",   x:"7月底清零！"},
  {id:1,u:true, r:"年利率15%最高，循環利息最貴，清完省最多",           x:"清完後打 Line Bank 一筆"},
  {id:5,u:false,r:"年利率14.84%，綁約至2027/1，只能付最低3,784元",    x:"2027/1後可大額攻打"},
  {id:7,u:false,r:"年利率13%，綁約至2027/3，只能付最低5,582元",       x:"2027/3後可大額攻打"},
  {id:4,u:false,r:"年利率8.97%，Line Bank一筆，餘額約19.5萬",         x:""},
  {id:3,u:false,r:"年利率5.03%，樂天信貸，餘額58萬",                  x:""},
  {id:6,u:false,r:"年利率3.48%，Line Bank二筆利率低，不急",           x:""},
  {id:9,u:false,r:"年利率1.5%，學貸餘額約1.1萬，快到期",              x:""},
];

const AO = [1,4,3,6,9];
const TABS = ["總覽","還款策略","月現金流","半年規劃","更新餘額"];
const f  = n => n>=10000?(n/10000).toFixed(1)+"萬":Math.round(n).toLocaleString();
const ff = n => "NT$ "+Math.round(n).toLocaleString();

function toDebts(arr){ return arr.map(d=>({...d,balance:d.bal??d.balance})); }
function fromStorage(){
  try{ const s=localStorage.getItem(SK); if(s){ const p=JSON.parse(s); if(p&&p.length) return p; } }catch(e){}
  return DD.map(d=>({...d,balance:d.bal}));
}

function sim(sd){
  const MN=["4月","5月","6月","7月","8月","9月"];
  const MX=[4,5,6,7,8,9];
  let st=sd.map(d=>({...d}));
  const ms=[];
  for(let i=0;i<6;i++){
    const mn=MX[i];
    const bon=BON.find(b=>b.m===mn)?.a||0;
    let tf=50000;
    const fp=[{n:"電商貨款",p:50000,c:"#63e6be"}];
    st=st.map(d=>{
      if(d.balance<=0) return d;
      const int=d.rate>0?d.balance*d.rate/100/12:0;
      let b=d.balance+int;
      if(d.type==="fri"){
        const sc=FS[mn]||0;
        const pd=Math.min(sc,b);
        if(pd>0){tf+=pd;fp.push({n:"親友",p:pd,c:"#f783ac"});}
        return {...d,balance:Math.max(0,b-pd)};
      }
      if(d.mp>0){
        const pd=Math.min(d.mp,b);
        tf+=pd;fp.push({n:d.name,p:pd,c:d.col});b-=pd;
      }
      return {...d,balance:Math.max(0,b)};
    });
    let ex=INC-EXP-tf+bon;
    if(ex<0)ex=0;
    const at=[];
    for(const id of AO){
      if(ex<=0)break;
      const d=st.find(x=>x.id===id);
      if(!d||d.balance<=0)continue;
      const p=Math.min(ex,d.balance);
      at.push({id,n:d.name,c:d.col,p});
      st=st.map(x=>x.id===id?{...x,balance:Math.max(0,x.balance-p)}:x);
      ex-=p;
    }
    const td=st.filter(d=>d.id!==10).reduce((s,d)=>s+d.balance,0);
    const nc=at.filter(a=>st.find(x=>x.id===a.id)?.balance===0).map(a=>a.n);
    const pf=ms.length>0?ms[ms.length-1].snap.find(x=>x.id===8):sd.find(x=>x.id===8);
    const nf=st.find(x=>x.id===8);
    if(nf?.balance===0&&pf?.balance>0)nc.push("親友");
    ms.push({lb:MN[i],mn,bon,at,td,nc,fp,tf,snap:st.map(d=>({...d}))});
  }
  return ms;
}

function App(){
  const [debts,setDebts]=useState(fromStorage);
  const [tab,setTab]=useState(0);
  const [ev,setEv]=useState({});
  const [toast,setToast]=useState(false);

  useEffect(()=>{
    const init={};
    debts.forEach(d=>{init[d.id]=String(d.balance);});
    setEv(init);
  },[debts]);

  const save=()=>{
    const up=debts.map(d=>{
      const n=parseFloat((ev[d.id]||"0").replace(/,/g,""));
      return {...d,balance:isNaN(n)?d.balance:Math.max(0,n)};
    });
    setDebts(up);
    try{localStorage.setItem(SK,JSON.stringify(up));}catch(e){}
    setToast(true);
    setTimeout(()=>setToast(false),2500);
  };

  const reset=()=>{
    if(!window.confirm("確定重置所有餘額回初始值？"))return;
    const ini=DD.map(d=>({...d,balance:d.bal}));
    setDebts(ini);
    try{localStorage.removeItem(SK);}catch(e){}
  };

  const rd=debts.filter(d=>d.id!==10);
  const tot=rd.reduce((s,d)=>s+d.balance,0);
  const ori=DD.filter(d=>d.id!==10).reduce((s,d)=>s+d.bal,0);
  const paid=ori-tot;
  const pct=Math.min(100,Math.max(0,paid/ori*100));
  const mi=rd.filter(d=>d.rate>0).reduce((s,d)=>s+d.balance*d.rate/100/12,0);
  const mp=debts.reduce((s,d)=>s+(d.balance>0||d.type==="fix"?d.mp:0),0);
  const fc=INC-EXP-mp;

  return (
    <div className="app">
      <div className="h1">💰 債務管理中心</div>
      <div className="hsub">雪崩法還款規劃 · 半年預測</div>
      <div className="tabs">
        {TABS.map((t,i)=><button key={i} className={"tab"+(tab===i?" active":"")} onClick={()=>setTab(i)}>{t}</button>)}
      </div>

      {tab===0&&<>
        {paid>0&&<div className="card" style={{borderColor:"rgba(105,219,124,.3)",marginBottom:12}}>
          <div className="ctitle">還款進度 🎉</div>
          <div className="plabel"><span>已還清 {ff(paid)}</span><span>{pct.toFixed(1)}%</span></div>
          <div className="pbar"><div className="pfill" style={{width:pct+"%"}}/></div>
        </div>}
        <div className="alert">⚠️ 每月利息約 <strong style={{color:"#ff6b6b"}}>{ff(mi)}</strong>，全年約 {ff(mi*12)}。越快還越省！</div>
        <div className="grid2">
          <div className="mc"><div className="mlabel">總負債</div><div className="mval red">{f(tot)}</div></div>
          <div className="mc"><div className="mlabel">月利息</div><div className="mval yellow">{f(mi)}</div></div>
          <div className="mc"><div className="mlabel">月收入</div><div className="mval green">{f(INC)}</div></div>
          <div className="mc"><div className="mlabel">月可攻債</div><div className="mval blue">{f(fc)}</div></div>
        </div>
        <div className="card">
          <div className="ctitle">各項債務</div>
          {rd.map(d=>{
            const p=tot>0?Math.min(100,d.balance/tot*100):0;
            const cl=d.balance===0;
            return <div className="drow" key={d.id}>
              <div className="dot" style={{background:cl?"#2d3f55":d.col}}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className={"dname"+(cl?" cleared":"")}>
                    {d.name}
                    {cl&&<span className="badge bg">✓清零</span>}
                    {!cl&&d.rate>=13&&<span className="badge br">高利</span>}
                    {!cl&&d.rate===0&&d.id!==10&&<span className="badge bg">無息</span>}
                  </span>
                  <span className="dbal" style={{color:cl?"#2d3f55":d.col}}>{cl?"已還清":ff(d.balance)}</span>
                </div>
                {!cl&&<>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                    <span className="dmeta">年利率 {d.rate}%　{d.due?`每月${d.due}號`:"彈性"}</span>
                    <span className="dmeta">{d.mp>0?`月還 ${ff(d.mp)}`:"循環"}</span>
                  </div>
                  <div className="bwrap"><div className="bfill" style={{width:p+"%",background:d.col}}/></div>
                </>}
              </div>
            </div>;
          })}
        </div>
      </>}

      {tab===1&&<div className="card">
        <div className="ctitle">雪崩法還款順序</div>
        <div className="tip" style={{marginBottom:12}}><strong>策略：</strong>先付最低還款，剩餘集中打最高利率。每清一筆資金往下轉，速度越來越快。</div>
        {PRI.map((item,i)=>{
          const d=debts.find(x=>x.id===item.id);
          const cl=d.balance===0;
          return <div className="prow" key={item.id} style={{opacity:cl?0.35:1}}>
            <div className={"pnum"+(item.u&&!cl?" urgent":"")}>{cl?"✓":i+1}</div>
            <div className="pbody">
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span className="pname">{d.name}{d.rate>0&&<span className="badge br">{d.rate}%</span>}{cl&&<span className="badge bg">清零</span>}</span>
                <span className="pamount">{cl?"—":ff(d.balance)}</span>
              </div>
              <div className="preason">{item.r}</div>
              {item.x&&!cl&&<div className="preason" style={{color:"#ffd43b",marginTop:2}}>💡 {item.x}</div>}
            </div>
          </div>;
        })}
      </div>}

      {tab===2&&<>
        <div className="card">
          <div className="ctitle">每月收入</div>
          {[["夫妻月薪",110000],["電商現金流",100000],["育兒補助",11000],["房租補貼",5000]].map(([l,v])=>(
            <div className="frow" key={l}><span className="flabel">{l}</span><span className="fplus">+{ff(v)}</span></div>
          ))}
          <div className="hdiv"/>
          <div className="frow"><span style={{fontWeight:700}}>合計</span><span className="fplus" style={{fontSize:15}}>+{ff(INC)}</span></div>
        </div>
        <div className="card">
          <div className="ctitle">每月生活支出</div>
          {[["房租",20000],["學費",15000],["加油",5000],["訂閱",2658],["網路+手機",1797]].map(([l,v])=>(
            <div className="frow" key={l}><span className="flabel">{l}</span><span className="fminus">-{ff(v)}</span></div>
          ))}
          <div className="hdiv"/>
          <div className="frow"><span style={{fontWeight:700}}>合計</span><span className="fminus">-{ff(EXP)}</span></div>
        </div>
        <div className="card">
          <div className="ctitle">每月固定還款</div>
          {debts.filter(d=>d.mp>0).map(d=>(
            <div className="frow" key={d.id}>
              <span className="flabel" style={{color:d.balance===0&&d.type!=="fix"?"#2d3f55":"#8a9ab0"}}>{d.name}{d.balance===0&&d.type!=="fix"&&" ✓"}</span>
              <span className="fminus" style={{color:d.balance===0&&d.type!=="fix"?"#2d3f55":"#ff6b6b"}}>-{ff(d.mp)}</span>
            </div>
          ))}
          <div className="hdiv"/>
          <div className="frow"><span style={{fontWeight:700}}>合計</span><span className="fminus">-{ff(mp)}</span></div>
        </div>
        <div className="card" style={{borderColor:"rgba(105,219,124,.3)"}}>
          <div className="frow">
            <span style={{fontWeight:900}}>月剩餘可攻債</span>
            <span className="fplus" style={{fontSize:18,fontWeight:900}}>+{ff(fc)}</span>
          </div>
          <div className="tip" style={{marginTop:10}}><strong>親友計畫：</strong>5月3萬、6月3萬、7月4萬 → 7月底清零！</div>
        </div>
        <div className="card">
          <div className="ctitle">全年獎金</div>
          {BON.map(b=><div className="brow" key={b.m}>
            <span className="bmon">{b.m}月</span><span className="blab">{b.l}</span><span className="bamt">+{ff(b.a)}</span>
          </div>)}
          <div className="hdiv"/>
          <div className="brow">
            <span className="bmon" style={{color:"#dde3f0",fontWeight:900}}>合計</span>
            <span className="blab" style={{color:"#dde3f0",fontWeight:700}}>全年獎金</span>
            <span className="bamt" style={{fontSize:15}}>+{ff(586000)}</span>
          </div>
        </div>
      </>}

      {tab===3&&(()=>{
        const plan=sim(debts);
        const st2=debts.filter(d=>d.id!==10).reduce((s,d)=>s+d.balance,0);
        const et=plan[plan.length-1]?.td||st2;
        const red=st2-et;
        return <>
          <div className="card" style={{borderColor:"rgba(105,219,124,.25)"}}>
            <div className="ctitle">半年預測（4月～9月）</div>
            <div className="grid2">
              <div className="mc"><div className="mlabel">目前總負債</div><div className="mval red">{f(st2)}</div></div>
              <div className="mc"><div className="mlabel">9月底預計</div><div className="mval yellow">{f(et)}</div></div>
            </div>
            <div style={{background:"rgba(105,219,124,.07)",border:"1px solid rgba(105,219,124,.2)",borderRadius:10,padding:12,fontSize:13}}>
              半年還清 <span style={{color:"#69db7c",fontWeight:900}}>{ff(red)}</span>，負債減少 <span style={{color:"#69db7c",fontWeight:900}}>{((red/st2)*100).toFixed(1)}%</span>
            </div>
          </div>
          <div className="tip" style={{marginBottom:12}}>
            <strong>計算方式：</strong>每月先扣最低還款＋親友排程＋電商5萬，剩餘集中打最高利率。<br/>
            <span style={{color:"#ff6b6b"}}>⚠️ 中信（綁約2027/1）與玉山信貸（綁約2027/3）只計最低還款。</span>
          </div>
          {plan.map((m,i)=><div className="mcard" key={i}>
            <div className="mcard-head">
              <span className="mcard-month">{m.lb}{m.bon>0&&<span className="badge by" style={{marginLeft:8}}>獎金🎉</span>}</span>
              <span style={{fontSize:13,color:"#4a5568"}}>負債 <span style={{color:"#ffd43b",fontWeight:700}}>{f(m.td)}</span></span>
            </div>
            {m.bon>0&&<div className="mcard-bonus">+ 獎金 {ff(m.bon)}</div>}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:"#4a5568",fontFamily:"JetBrains Mono",marginBottom:4,textTransform:"uppercase"}}>固定還款 -{ff(m.tf)}</div>
              {m.fp.map((f2,j)=><div className="arow" key={j}>
                <div className="adot" style={{background:f2.c}}/><span className="aname" style={{color:"#5a6a80"}}>{f2.n}</span>
                <span style={{fontFamily:"JetBrains Mono",fontSize:12,color:"#5a6a80"}}>-{ff(f2.p)}</span>
              </div>)}
            </div>
            {m.at.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:"#4a5568",fontFamily:"JetBrains Mono",marginBottom:4,textTransform:"uppercase"}}>額外攻債</div>
              {m.at.map((a,j)=><div className="arow" key={j}>
                <div className="adot" style={{background:a.c}}/><span className="aname">{a.n}</span><span className="apay">-{ff(a.p)}</span>
              </div>)}
            </div>}
            {m.nc.length>0&&<div style={{marginTop:6}}>{m.nc.map(n=><span key={n} className="cbadge">✓ {n} 清零！</span>)}</div>}
            <div style={{marginTop:10}}>
              <div className="plabel"><span>負債比起初</span><span>{((m.td/st2)*100).toFixed(1)}%</span></div>
              <div className="pbar"><div className="pfill" style={{width:`${100-(m.td/st2)*100}%`}}/></div>
            </div>
          </div>)}
        </>;
      })()}

      {tab===4&&<>
        <div className="card">
          <div className="ctitle">還款後更新餘額</div>
          {debts.filter(d=>d.id!==10).map(d=>{
            const cur=ev[d.id]??String(d.balance);
            const num=parseFloat((cur||"0").replace(/,/g,""));
            const diff=isNaN(num)?0:num-d.balance;
            const ch=!isNaN(num)&&num!==d.balance;
            return <div className="erow" key={d.id}>
              <div className="ehead">
                <div className="dot" style={{background:d.col}}/>
                <span className="ename">{d.name}</span>
                {d.rate>0&&<span className="erate">{d.rate}%</span>}
                {d.rate===0&&<span className="badge bg" style={{marginLeft:0}}>無息</span>}
              </div>
              <div className="ewrap">
                <input className={"einput"+(ch?" ch":"")} type="number" inputMode="numeric" min="0"
                  value={cur} placeholder="輸入最新餘額"
                  onChange={e=>setEv(prev=>({...prev,[d.id]:e.target.value}))}/>
                <span className="eunit">元</span>
              </div>
              {ch&&<div className="ediff" style={{color:diff<0?"#69db7c":"#ff6b6b"}}>
                {diff<0?`↓ 已還 NT$ ${Math.abs(diff).toLocaleString()}`:`↑ 增加 NT$ ${diff.toLocaleString()}`}
              </div>}
            </div>;
          })}
          <button className="sbtn" onClick={save}>✓ 儲存更新</button>
          <button className="rbtn" onClick={reset}>重置為初始資料</button>
        </div>
        <div className="tip"><strong>說明：</strong>輸入最新餘額後按儲存，所有頁面數字自動更新。資料存在手機，下次打開還在。還清輸入 0。</div>
      </>}

      {toast&&<div className="toast">✓ 已儲存！數字已更新</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
